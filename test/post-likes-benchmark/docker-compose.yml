services:
  mysql:
    image: mysql:8.4
    container_name: post-likes-bench-mysql
    command: >
      --defaults-file=/etc/mysql/conf.d/bench.cnf
      --innodb-buffer-pool-size=${BUFFER_POOL_SIZE:-64M}
      --performance-schema=ON
      --innodb-monitor-enable=all
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpw}
      MYSQL_DATABASE: ${BENCH_DB:-likes_bench}
      TZ: UTC
    ports:
      - "${MYSQL_PORT:-13306}:3306"
    volumes:
      - ./mysql/conf.d/bench.cnf:/etc/mysql/conf.d/bench.cnf:ro
      - post_likes_bench_mysql_data:/var/lib/mysql
    mem_limit: ${MYSQL_MEMORY_LIMIT:-512m}
    cpus: ${MYSQL_CPU_LIMIT:-2.0}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -p${MYSQL_ROOT_PASSWORD:-rootpw} --silent"]
      interval: 5s
      timeout: 3s
      retries: 30

volumes:
  post_likes_bench_mysql_data:
